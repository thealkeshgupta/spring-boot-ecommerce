# App Info
spring.application.name=app-server

# Database Configuration (Uses Render Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Security & App Config
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=3000000
spring.ecom.app.jwtCookieName=springBootEcom

# File & Storage Configuration
project.image=images/
image.base.url=${BACKEND_URL}
frontend.url=${FRONTEND_URL}

# Supabase Storage (Uses Render Environment Variables)
supabase.storage.endpoint=https://wdoxdxvsyrbhsxoxqzed.supabase.co/storage/v1/s3
supabase.storage.region=${SUPABASE_REGION}
supabase.storage.access-key=${SUPABASE_ACCESS_KEY}
supabase.storage.secret-key=${SUPABASE_SECRET_KEY}
supabase.storage.bucket-name=product-images

# Third Party Services
stripe.secret.key=${STRIPE_SECRET_KEY}